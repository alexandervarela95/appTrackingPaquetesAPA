<aside class="sidebar-shell" aria-label="Modulos principales">
  <div class="sidebar-brand">
    <span class="brand-mark">
      <i class="pi pi-send" aria-hidden="true"></i>
    </span>
    <div>
      <span>Almacen Pajaro Azul</span>
      <strong>Tracking Envio</strong>
    </div>
  </div>

  <nav class="sidebar-menu" aria-label="Navegacion principal">
    @for (item of menuItems; track item.ruta) {
      <a [routerLink]="item.ruta" routerLinkActive="active-item">
        <i [class]="item.icono" aria-hidden="true"></i>
        <span>{{ item.etiqueta }}</span>
      </a>
    }
  </nav>

  <div class="sidebar-footer">
    <button type="button" class="user-bubble" title="Cerrar sesion" (click)="regresarLogin()">
      <i class="pi pi-sign-out"></i>
    </button>
    <small>Almacen Pajaro Azul 2026</small>
  </div>
</aside>
