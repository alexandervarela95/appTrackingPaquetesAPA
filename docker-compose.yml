version: '3.9'

services:
  mongodb:
    image: mongo:7.0
    container_name: apptrackingpaquetes_mongodb
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: appTrackingPaquetesAPA

  redis:
    image: redis:7.2
    container_name: apptrackingpaquetes_redis
    ports:
      - '6379:6379'
    command: ["redis-server", "--appendonly", "yes"]

volumes:
  mongo_data:
